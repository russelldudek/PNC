name: Candidate campaign quality
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 pypdf playwright weasyprint
          python -m playwright install --with-deps chromium
      - name: Generate candidate documents
        run: python scripts/generate_pdfs.py
      - name: Run source, link, PDF, and confidentiality checks
        run: python scripts/qa.py
      - name: Start local site
        run: |
          python -m http.server 8765 --bind 127.0.0.1 > /tmp/pnc-site.log 2>&1 &
          echo $! > /tmp/pnc-site.pid
          sleep 2
      - name: Run responsive, interaction, reduced-motion, and Chromium print checks
        env:
          BASE_URL: http://127.0.0.1:8765
        run: python scripts/browser_qa.py
      - name: Commit generated documents and stable audit records
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/*.pdf audit/qa-report.json audit/browser-qa.json
          if ! git diff --cached --quiet; then
            git commit -m "Generate and verify candidate documents"
            git push
          fi
      - name: Upload visual audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: candidate-campaign-audit
          path: |
            audit/browser-renders/
            audit/browser-qa.json
            audit/qa-report.json
            audit/chromium-pdfs/
